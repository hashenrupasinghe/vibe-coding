<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Identity Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .profile {
            max-width: 400px;
            margin: auto;
            background: linear-gradient(to bottom, #ffffff, #e0e0e0);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 10px;
        }
        .profile h1 {
            color: #333;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile p {
            margin: 10px 0;
        }
        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="profile">
        <img src="hash.JPG" alt="Student Profile Photo">
        <h1>Student Identity Profile</h1>
        <p><span class="label">Name:</span> John Doe</p>
        <p><span class="label">Subject:</span> Computer Science</p>
        <p><span class="label">Bio:</span> Passionate about coding and problem-solving. Enjoys learning new technologies and collaborating on projects.</p>
    </div>
</body>
</html>
